name: RDP-Static-Persistent-Final

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Parse ENV_CONFIG Single-Secret
        shell: powershell
        env:
          ENV_CONFIG: ${{ secrets.ENV_CONFIG }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ENV_CONFIG)) { Write-Error "ENV_CONFIG secret is missing or empty!"; exit 1 }
          $trimmed = $env:ENV_CONFIG.Trim()
          if ($trimmed.StartsWith("{")) {
              try {
                  $config = $trimmed | ConvertFrom-Json -ErrorAction Stop
                  foreach ($prop in $config.PSObject.Properties) {
                      $key = $prop.Name
                      $val = $prop.Value
                      if ($key -eq "install") {
                          foreach ($subProp in $val.PSObject.Properties) {
                              $subKey = "INSTALL_" + $subProp.Name.ToUpper()
                              $subVal = $subProp.Value.ToString().ToLower()
                              echo "::add-mask::$subVal"
                              echo "$subKey=$subVal" >> $env:GITHUB_ENV
                              [System.Environment]::SetEnvironmentVariable($subKey, $subVal, "Machine")
                          }
                      } else {
                          $valStr = $val.ToString()
                          echo "::add-mask::$valStr"
                          echo "$key=$valStr" >> $env:GITHUB_ENV
                          [System.Environment]::SetEnvironmentVariable($key, $valStr, "Machine")
                      }
                  }
              } catch {
                  Write-Error "Failed to parse JSON configuration: $_"
                  exit 1
              }
          } else {
              $lines = $trimmed -split "\r?\n"
              foreach ($line in $lines) {
                  if ([string]::IsNullOrWhiteSpace($line) -or $line.Trim().StartsWith("#")) { continue }
                  $parts = $line -split "=", 2
                  if ($parts.Length -eq 2) {
                      $key = $parts[0].Trim()
                      $value = $parts[1]
                      if (($value.Length -ge 2) -and (($value.StartsWith('"') -and $value.EndsWith('"')) -or ($value.StartsWith("'") -and $value.EndsWith("'")))) {
                          $value = $value.Substring(1, $value.Length - 2)
                      }
                      if ([string]::IsNullOrWhiteSpace($value)) { continue }
                      echo "::add-mask::$value"
                      echo "$key=$value" >> $env:GITHUB_ENV
                      [System.Environment]::SetEnvironmentVariable($key, $value, "Machine")
                  }
              }
          }


      - name: Checkout Cloud Repository (Database & Scripts)
        shell: powershell
        run: |
          Write-Host "Authenticating to Cloud Database: $($env:BACKUP_DB_USER)/$($env:BACKUP_DB_REPO)"
          $repoUrl = "https://$($env:BACKUP_DB_USER):$($env:BACKUP_DB_PAT)@github.com/$($env:BACKUP_DB_USER)/$($env:BACKUP_DB_REPO).git"
          
          $cloneOutput = cmd.exe /c "git clone -q `"$repoUrl`" C:\state-repo 2>&1"
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path "C:\state-repo\.git")) {
              Write-Error "CRITICAL: Access to Cloud Repo denied. Check if BACKUP_DB_PAT is expired!"
              exit 1 
          }
          Write-Host "Cloud Repo connection established." -ForegroundColor Green
          icacls "C:\state-repo" /grant "Everyone:(OI)(CI)F" /T | Out-Null
          
          # Clean up any residual lifecycle flags from previous sessions
          if (Test-Path "C:\state-repo\end_run.flag") {
              Remove-Item "C:\state-repo\end_run.flag" -Force -ErrorAction SilentlyContinue
              Write-Host "Wiped residual end_run.flag from state-repo."
          }

      - name: Provision Local Administrator Account
        shell: powershell
        run: |
          $securePass = ConvertTo-SecureString "$env:RDP_PASSWORD" -AsPlainText -Force
          New-LocalUser -Name "$env:RDP_USERNAME" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "$env:RDP_USERNAME"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$env:RDP_USERNAME"

      - name: Initialize Logon Hooks & Background Daemons
        shell: powershell
        run: |
          $logonScript = @(
              '$initDir = "C:\state-repo\Repository\Initialized"',
              '$bootTime = (Get-CimInstance Win32_OperatingSystem).LastBootUpTime.ToString("yyyyMMdd-HHmm")',
              '$runFlag = "C:\state-repo\init_ran_$bootTime.flag"',
              'if ((Test-Path $initDir) -and -not (Test-Path $runFlag)) {',
              '    Get-ChildItem -Path $initDir -Filter "*.ps1" | Sort-Object Name | ForEach-Object {',
              '        $runScript = $true',
              '        if ($_.Name -match "(?i)(?:^|\d+-)?Install-([A-Za-z0-9_-]+)\.ps1$") {',
              '            $appName = $Matches[1].ToLower()',
              '            $envVarName = "INSTALL_" + $appName.ToUpper()',
              '            $toggleVal = [System.Environment]::GetEnvironmentVariable($envVarName, "Machine")',
              '            if ($toggleVal -ne "true") {',
              '                $runScript = $false',
              '            }',
              '        }',
              '        if ($runScript) {',
              '            if ($_.Name -eq "00-StateRestore.ps1") {',
              '                Start-Process "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -WindowStyle Hidden -File `"$($_.FullName)`"" -Wait',
              '            } else {',
              '                Start-Process "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -WindowStyle Hidden -File `"$($_.FullName)`""',
              '            }',
              '        }',
              '    }',
              '    New-Item -Path $runFlag -ItemType File -Force | Out-Null',
              '}'
          )
          $logonScript | Out-File -FilePath "C:\state-repo\Run-InitScripts.ps1" -Encoding UTF8
          
          # Register Scheduled Task to trigger immediately on logon of the RDP user
          $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -WindowStyle Hidden -File C:\state-repo\Run-InitScripts.ps1"
          $trigger = New-ScheduledTaskTrigger -AtLogOn -User "$env:RDP_USERNAME"
          $principal = New-ScheduledTaskPrincipal -UserId "$env:RDP_USERNAME" -RunLevel Highest
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
          Register-ScheduledTask -Action $action -Trigger $trigger -Principal $principal -Settings $settings -TaskName "RDPLogonInit" -Force

      - name: Execute Privileged Provisioning Scripts
        shell: powershell
        run: |
          $privilegedDir = "C:\state-repo\Repository\Privileged"
          if (Test-Path $privilegedDir) {
              Get-ChildItem -Path $privilegedDir -Filter "*.ps1" | Sort-Object Name | ForEach-Object {
                  $runScript = $true
                  if ($_.Name -match "(?i)(?:^|\d+-)?Install-([A-Za-z0-9_-]+)\.ps1$") {
                      $appName = $Matches[1].ToLower()
                      $envVarName = "INSTALL_" + $appName.ToUpper()
                      $toggleVal = [System.Environment]::GetEnvironmentVariable($envVarName, "Machine")
                      if ($toggleVal -ne "true") {
                          Write-Host "Skipping Privileged Installer: $($_.Name) (as $envVarName is not set to 'true')"
                          $runScript = $false
                      }
                  }
                  if ($runScript) {
                      Write-Host "::group::Executing Privileged Script: $($_.Name)"
                      & $_.FullName
                      Write-Host "::endgroup::"
                  }
              }
          } else {
              Write-Warning "Privileged scripts directory not found."
          }


      - name: Execute Interactive Runtime & Telemetry Stream
        shell: powershell
        run: |
          Write-Host "================ SECURE VPN ENTRY ================"
          Write-Host "Routing IP : $env:TAILSCALE_IP"
          Write-Host "Identifier : $env:RDP_USERNAME"
          Write-Host "=================================================="
          Write-Host "System diagnostics will stream securely upon connection..."
          
          $logDir = "C:\state-repo\Logs"
          $logPositions = @{}
          $endTime = (Get-Date).AddMinutes(350)
          
          $saveRuntimeEnabled = "$env:SAVE_RUNTIME" -eq "true"
          
          $timeoutStr = $env:IDLE_TIMEOUT_MIN
          if ([string]::IsNullOrWhiteSpace($timeoutStr)) { $timeoutStr = "3" }
          $idleTimeoutSeconds = [int]$timeoutStr * 60
          
          $startTime = Get-Date
          $isLoggedIn = $false
          
          # Pre-seed log positions to current EOF of every existing log file.
          # This prevents historical log content (from previous sessions persisted in git)
          # from being replayed into this session's GHA output.
          if (Test-Path $logDir) {
              Get-ChildItem -Path $logDir -Filter "*.log" | ForEach-Object {
                  $logPositions[$_.Name] = $_.Length
                  Write-Host "[TELEMETRY] Skipping $($_.Length) bytes of historical log in $($_.Name)"
              }
          }
          Write-Host "[TELEMETRY] Log baseline captured. Only live output from this session will be streamed."
          
          while ((Get-Date) -lt $endTime) {
              if ($saveRuntimeEnabled -and -not $isLoggedIn) {
                  $qwinsta = qwinsta 2>&1 | Out-String
                  if ($qwinsta -match "rdp-tcp#.*Active") {
                      $isLoggedIn = $true
                      Write-Host "`n[SUCCESS] RDP Connection established. Handing over idle monitoring to interactive daemon..." -ForegroundColor Green
                  } elseif (((Get-Date) - $startTime).TotalSeconds -gt $idleTimeoutSeconds) {
                      Write-Host "`n[ALERT] Pre-Login Timeout Reached! No RDP connection was established within $timeoutStr minutes." -ForegroundColor Yellow
                      Write-Host "::notice::Workflow completion triggered by Idle Timeout (Pre-Login)."
                      break
                  }
              }
              
              if (Test-Path "C:\state-repo\end_run.flag") {
                  Write-Host "`n[ALERT] Post-Login User Idle Timeout Reached! Gracefully finishing workflow..." -ForegroundColor Yellow
                  Write-Host "::notice::Workflow completion triggered by User Idle Timeout."
                  break
              }
              
              if (Test-Path $logDir) {
                  Get-ChildItem -Path $logDir -Filter "*.log" | ForEach-Object {
                      $filePath = $_.FullName
                      $fileName = $_.Name
                      if (-not $logPositions.ContainsKey($fileName)) { $logPositions[$fileName] = $_.Length }
                      $lastPos = $logPositions[$fileName]
                      
                      $file = Get-Item $filePath
                      if ($file.Length -gt $lastPos) {
                          $fs = [System.IO.FileStream]::new($filePath, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::ReadWrite)
                          $fs.Seek($lastPos, [System.IO.SeekOrigin]::Begin) | Out-Null
                          $reader = [System.IO.StreamReader]::new($fs)
                          while (-not $reader.EndOfStream) { 
                              $line = $reader.ReadLine()
                              Write-Host "[$fileName] $line" 
                          }
                          $logPositions[$fileName] = $fs.Position
                          $reader.Close()
                          $fs.Close()
                      }
                  }
              }
              Start-Sleep -Seconds 5
          }

      - name: Finalize Session Persistence & State Synchronization
        if: always()
        shell: powershell
        run: |
          Write-Host "=== INITIATING EMERGENCY TEARDOWN ==="
          $stateRepo = 'C:\state-repo'
          if (-not (Test-Path $stateRepo)) { exit 0 }
          
          if (Test-Path "$stateRepo\Repository\Essentials\Force-Backup.ps1") {
              Write-Host "Executing Final Backup..."
              & "$stateRepo\Repository\Essentials\Force-Backup.ps1"
          }
