name: RDP-Static-Persistent-Final

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Parse ENV_CONFIG Single-Secret
        shell: powershell
        env:
          ENV_CONFIG: ${{ secrets.ENV_CONFIG }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ENV_CONFIG)) { Write-Error "ENV_CONFIG secret is missing or empty!"; exit 1 }
          $trimmed = $env:ENV_CONFIG.Trim()
          if ($trimmed.StartsWith("{")) {
              try {
                  $config = $trimmed | ConvertFrom-Json -ErrorAction Stop
                  foreach ($prop in $config.PSObject.Properties) {
                      $key = $prop.Name
                      $val = $prop.Value
                      if ($key -eq "install") {
                          foreach ($subProp in $val.PSObject.Properties) {
                              $subKey = "INSTALL_" + $subProp.Name.ToUpper()
                              $subVal = $subProp.Value.ToString().ToLower()
                              if ($subVal.Length -gt 4 -and $subVal -ne "true" -and $subVal -ne "false") {
                                  echo "::add-mask::$subVal"
                              }
                              [System.Environment]::SetEnvironmentVariable($subKey, $subVal, "Machine")
                          }
                       } else {
                          $valStr = $val.ToString()
                          $valLower = $valStr.ToLower()
                          if ($valLower -ne "true" -and $valLower -ne "false" -and $valStr -notmatch '^\d+$' -and $valStr.Length -ge 3) {
                              echo "::add-mask::$valStr"
                          }
                          [System.Environment]::SetEnvironmentVariable($key, $valStr, "Machine")
                      }
                  }
              } catch {
                  Write-Error "Failed to parse JSON configuration: $_"
                  exit 1
              }
          } else {
              $lines = $trimmed -split "\r?\n"
              foreach ($line in $lines) {
                  if ([string]::IsNullOrWhiteSpace($line) -or $line.Trim().StartsWith("#")) { continue }
                  $parts = $line -split "=", 2
                  if ($parts.Length -eq 2) {
                      $key = $parts[0].Trim()
                      $value = $parts[1]
                      if (($value.Length -ge 2) -and (($value.StartsWith('"') -and $value.EndsWith('"')) -or ($value.StartsWith("'") -and $value.EndsWith("'")))) {
                          $value = $value.Substring(1, $value.Length - 2)
                      }
                      if ([string]::IsNullOrWhiteSpace($value)) { continue }
                      $valLower = $value.ToLower()
                      if ($valLower -ne "true" -and $valLower -ne "false" -and $value -notmatch '^\d+$' -and $value.Length -ge 3) {
                          echo "::add-mask::$value"
                      }
                      [System.Environment]::SetEnvironmentVariable($key, $value, "Machine")
                  }
              }
          }


      - name: Install & Authenticate Tailscale VPN
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          $envVarName = "INSTALL_VPN"
          $toggleVal = [System.Environment]::GetEnvironmentVariable($envVarName, "Machine")
          if ($toggleVal -ne "true") {
              Write-Host "Skipping Tailscale VPN installation."
              exit 0
          }
          
          Write-Host "::group::Deploying Tailscale VPN"
          $hostname = $env:RDP_USERNAME
          $tailnet = $env:TAILSCALE_TAILNET
          if ([string]::IsNullOrWhiteSpace($tailnet)) { $tailnet = "-" } 
          
          if (-not [string]::IsNullOrWhiteSpace($env:TAILSCALE_API_KEY)) {
              Write-Host "Tailscale API Key detected. Resolving stray offline nodes ($hostname)..."
              $headers = @{ "Authorization" = "Basic " + [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("$($env:TAILSCALE_API_KEY):")) }
              try {
                  $devicesUrl = "https://api.tailscale.com/api/v2/tailnet/$tailnet/devices"
                  $response = Invoke-RestMethod -Uri $devicesUrl -Headers $headers -Method Get
                  $strayDevices = $response.devices | Where-Object { $_.hostname -eq $hostname }
                  if ($strayDevices) { 
                      Write-Host "Found $($strayDevices.Count) stray offline nodes with hostname $hostname. Terminating..."
                      foreach ($dev in $strayDevices) { 
                          Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/device/$($dev.id)" -Headers $headers -Method Delete | Out-Null
                          Write-Host "Orphaned node $($dev.id) successfully terminated." 
                      } 
                  }
              } catch { 
                  Write-Host "Warning: Tailscale API resolution failed. Details: $_. Continuing..." 
              }
          }
          
          Write-Host "Downloading Tailscale installer..."
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile "$env:TEMP\tailscale.exe"
          Write-Host "Running Tailscale installation in quiet mode..."
          $process = Start-Process -FilePath "$env:TEMP\tailscale.exe" -ArgumentList "/quiet" -Wait -PassThru
          Write-Host "Installer completed with exit code: $($process.ExitCode)"
          
          Write-Host "Initializing Tailscale interface authentication..."
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TAILSCALE_AUTH_KEY --hostname="$hostname"
          
          $tsIP = $null; $retries = 0
          while (-not $tsIP -and $retries -lt 24) {
              $raw = (& "C:\Program Files\Tailscale\tailscale.exe" ip -4)
              if (-not [string]::IsNullOrWhiteSpace($raw) -and $raw -match "^100\.") {
                  $tsIP = $raw.Trim()
              } else {
                  Write-Host "Retry $($retries + 1)/24: IP not active yet. Sleeping 5s..."
                  Start-Sleep -Seconds 5
                  $retries++
              }
          }
          
          if (-not $tsIP) { 
              Write-Error "CRITICAL: Tailscale routing failed to retrieve a valid 100.x.x.x IP within timeout."
              exit 1 
          }
          
          Write-Host "Tailscale routing initialized successfully. Assigned IP: $tsIP" -ForegroundColor Green
          [System.Environment]::SetEnvironmentVariable("TAILSCALE_IP", $tsIP, "Machine")
          Write-Host "::endgroup::"

      - name: Checkout Cloud Repository (Database & Scripts)
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          Write-Host "Authenticating to Cloud Database..."
          $repoUrl = "https://$($env:BACKUP_DB_USER):$($env:BACKUP_DB_PAT)@github.com/$($env:BACKUP_DB_USER)/$($env:BACKUP_DB_REPO).git"
          
          $cloneOutput = cmd.exe /c "git clone -q `"$repoUrl`" C:\state-repo 2>&1"
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path "C:\state-repo\.git")) {
              Write-Error "CRITICAL: Access to Cloud Repo denied. Check if BACKUP_DB_PAT is expired!"
              exit 1 
          }
          Write-Host "Cloud Repo connection established." -ForegroundColor Green
          icacls "C:\state-repo" /grant "Everyone:(OI)(CI)F" /T | Out-Null
          
          # Clean up any residual lifecycle and sync flags from previous sessions
          if (Test-Path "C:\state-repo\end_run.flag") {
              Remove-Item "C:\state-repo\end_run.flag" -Force -ErrorAction SilentlyContinue
              Write-Host "Wiped residual end_run.flag from state-repo."
          }
          if (Test-Path "C:\state-repo\sync.lock") {
              Remove-Item "C:\state-repo\sync.lock" -Force -ErrorAction SilentlyContinue
              Write-Host "Wiped residual sync.lock from state-repo."
          }

      - name: Provision Local Administrator Account
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          $securePass = ConvertTo-SecureString "$env:RDP_PASSWORD" -AsPlainText -Force
          New-LocalUser -Name "$env:RDP_USERNAME" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "$env:RDP_USERNAME"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$env:RDP_USERNAME"


      - name: Initialize Logon Hooks & Background Daemons
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          $logonScript = @(
              '$initDir = "C:\state-repo\Repository\Initialized"',
              '$bootTime = (Get-CimInstance Win32_OperatingSystem).LastBootUpTime.ToString("yyyyMMdd-HHmm")',
              '$runFlag = "C:\state-repo\init_ran_$bootTime.flag"',
              'if ((Test-Path $initDir) -and -not (Test-Path $runFlag)) {',
              '    Get-ChildItem -Path $initDir -Filter "*.ps1" | Sort-Object Name | ForEach-Object {',
              '        $runScript = $true',
              '        if ($_.Name -match "(?i)(?:^|\d+-)?Install-([A-Za-z0-9_-]+)\.ps1$") {',
              '            $appName = $Matches[1].ToLower()',
              '            $envVarName = "INSTALL_" + $appName.ToUpper()',
              '            $toggleVal = [System.Environment]::GetEnvironmentVariable($envVarName, "Machine")',
              '            if ($toggleVal -ne "true") {',
              '                $runScript = $false',
              '            }',
              '        }',
              '        if ($runScript) {',
              '            if ($_.Name -eq "00-StateRestore.ps1") {',
              '                Start-Process "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -WindowStyle Hidden -File `"$($_.FullName)`"" -Wait',
              '            } else {',
              '                Start-Process "powershell.exe" -ArgumentList "-ExecutionPolicy Bypass -WindowStyle Hidden -File `"$($_.FullName)`""',
              '            }',
              '        }',
              '    }',
              '    New-Item -Path $runFlag -ItemType File -Force | Out-Null',
              '}'
          )
          $logonScript | Out-File -FilePath "C:\state-repo\Run-InitScripts.ps1" -Encoding UTF8
          
          # Register Scheduled Task to trigger immediately on logon of the RDP user
          $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-ExecutionPolicy Bypass -WindowStyle Hidden -File C:\state-repo\Run-InitScripts.ps1"
          $trigger = New-ScheduledTaskTrigger -AtLogOn -User "$env:RDP_USERNAME"
          $principal = New-ScheduledTaskPrincipal -UserId "$env:RDP_USERNAME" -RunLevel Highest
          $settings = New-ScheduledTaskSettingsSet -AllowStartIfOnBatteries -DontStopIfGoingOnBatteries -StartWhenAvailable
          Register-ScheduledTask -Action $action -Trigger $trigger -Principal $principal -Settings $settings -TaskName "RDPLogonInit" -Force

      - name: Execute Privileged Provisioning Scripts
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          $privilegedDir = "C:\state-repo\Repository\Privileged"
          if (Test-Path $privilegedDir) {
              Get-ChildItem -Path $privilegedDir -Filter "*.ps1" | Sort-Object Name | ForEach-Object {
                  $runScript = $true
                  if ($_.Name -match "(?i)(?:^|\d+-)?Install-([A-Za-z0-9_-]+)\.ps1$") {
                      $appName = $Matches[1].ToLower()
                      $envVarName = "INSTALL_" + $appName.ToUpper()
                      $toggleVal = [System.Environment]::GetEnvironmentVariable($envVarName, "Machine")
                      if ($toggleVal -ne "true") {
                          Write-Host "Skipping Privileged Installer: $($_.Name)"
                          $runScript = $false
                      }
                  }
                  if ($runScript) {
                      Write-Host "::group::Executing Privileged Script: $($_.Name)"
                      & $_.FullName
                      Write-Host "::endgroup::"
                  }
              }
          } else {
              Write-Warning "Privileged scripts directory not found."
          }


      - name: Execute Interactive Runtime & Telemetry Stream
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          Write-Host "================ SECURE VPN ENTRY ================"
          Write-Host "Routing IP : $env:TAILSCALE_IP"
          Write-Host "Identifier : $env:RDP_USERNAME"
          Write-Host "=================================================="
          Write-Host "System diagnostics will stream securely upon connection..."
          
          $logDir = "C:\state-repo\Logs"
          $logPositions = @{}
          $endTime = (Get-Date).AddMinutes(350)
          
          $saveRuntimeEnabled = "$env:SAVE_RUNTIME" -eq "true"
          
          $timeoutStr = $env:IDLE_TIMEOUT_MIN
          if ([string]::IsNullOrWhiteSpace($timeoutStr)) { $timeoutStr = "3" }
          $idleTimeoutSeconds = [int]$timeoutStr * 60
          
          $startTime = Get-Date
          $isLoggedIn = $false
          
          # Pre-seed log positions to current EOF of every existing log file.
          # This prevents historical log content (from previous sessions persisted in git)
          # from being replayed into this session's GHA output.
          if (Test-Path $logDir) {
              Get-ChildItem -Path $logDir -Filter "*.log" | ForEach-Object {
                  $logPositions[$_.Name] = $_.Length
                  Write-Host "[TELEMETRY] Skipping $($_.Length) bytes of historical log in $($_.Name)"
              }
          }
          Write-Host "[TELEMETRY] Log baseline captured. Only live output from this session will be streamed."
          
          $wsPath = "C:\state-repo\Repository\WorkSpace"
          $literalMaskFilters = @{}
          
          while ((Get-Date) -lt $endTime) {
              # Scan/refresh telemetry blocklists and filters dynamically
              $telemetryBlocklist = @{}
              $hideFilters = @{}
              $maskFilters = @{}
              $showOnlyFilters = @{}
              $telemetryDisplayNames = @{}
              
              $searchPaths = @()
              if (Test-Path $wsPath) {
                  $searchPaths += Get-ChildItem -Path $wsPath -Directory
              }
              $frameworkPaths = @("C:\state-repo\Repository\Privileged", "C:\state-repo\Repository\Initialized", "C:\state-repo\Repository\Essentials")
              foreach ($fp in $frameworkPaths) {
                  if (Test-Path $fp) {
                      $searchPaths += [PSCustomObject]@{
                          FullName = $fp
                          Name = Split-Path $fp -Leaf
                      }
                  }
              }
              
              $searchPaths | ForEach-Object {
                  $projDir = $_.FullName
                  $projName = $_.Name
                  
                  # Resolve pseudo name if exists
                  $displayName = $projName
                  $pseudoFile = Get-ChildItem -Path $projDir -Filter "*.pseudo" | Select-Object -First 1
                  if ($pseudoFile) {
                      $displayName = $pseudoFile.BaseName
                  }
                  
                  $logNames = @()
                  if (Test-Path $logDir) {
                      Get-ChildItem -Path $logDir -Filter "$projName*.log" | ForEach-Object {
                          if ($_.Name -eq "$projName.log" -or $_.Name.StartsWith("$projName-")) {
                              $logNames += $_.Name
                              $suffix = $_.Name.Substring($projName.Length)
                              if ($displayName -eq "Clean") {
                                  $telemetryDisplayNames[$_.Name] = "$projName$suffix"
                              } else {
                                  $telemetryDisplayNames[$_.Name] = "$displayName$suffix"
                              }
                          }
                      }
                  }
                  
                  # Read explicitly owned custom log files from telemetry_logs.txt
                  $customLogListFile = Join-Path $projDir "telemetry_logs.txt"
                  if (Test-Path $customLogListFile) {
                      Get-Content $customLogListFile | ForEach-Object {
                          $l = $_.Trim()
                          if (-not [string]::IsNullOrWhiteSpace($l) -and -not $l.StartsWith("#") -and $l.EndsWith(".log")) {
                              if (-not $logNames.Contains($l)) {
                                  $logNames += $l
                                  # For external logs, prefix the display name with the project alias
                                  if ($displayName -eq "Clean") {
                                      $telemetryDisplayNames[$l] = $l
                                  } else {
                                      $telemetryDisplayNames[$l] = "$displayName-$l"
                                  }
                              }
                          }
                      }
                  }
                  if ($logNames.Count -eq 0) {
                      $logNames = @("$projName.log", "$projName-Error.log")
                      if ($displayName -eq "Clean") {
                          $telemetryDisplayNames["$projName.log"] = "$projName.log"
                          $telemetryDisplayNames["$projName-Error.log"] = "$projName-Error.log"
                      } else {
                          $telemetryDisplayNames["$projName.log"] = "$displayName.log"
                          $telemetryDisplayNames["$projName-Error.log"] = "$displayName-Error.log"
                      }
                  }
                      
                      # Check for Telemetry.false
                      if (Test-Path (Join-Path $projDir "Telemetry.false")) {
                          foreach ($ln in $logNames) {
                              $telemetryBlocklist[$ln] = $true
                          }
                      }
                      
                      # Check for telemetry_filters.txt
                      $filterFile = Join-Path $projDir "telemetry_filters.txt"
                      if (Test-Path $filterFile) {
                          $hides = [System.Collections.Generic.List[string]]::new()
                          $masks = [System.Collections.Generic.List[string]]::new()
                          $showOnlys = [System.Collections.Generic.List[string]]::new()
                          
                          Get-Content $filterFile | ForEach-Object {
                              $l = $_.Trim()
                              if ([string]::IsNullOrWhiteSpace($l) -or $l.StartsWith("#")) { return }
                              if ($l -match "^hide:(.+)$") {
                                  $hides.Add($Matches[1].Trim())
                              } elseif ($l -match "^mask:(.+)$") {
                                  $masks.Add($Matches[1].Trim())
                              } elseif ($l -match "^show-only:(.+)$") {
                                  $showOnlys.Add($Matches[1].Trim())
                              }
                          }
                          
                          foreach ($ln in $logNames) {
                              if ($hides.Count -gt 0) { $hideFilters[$ln] = $hides }
                              if ($masks.Count -gt 0) { $maskFilters[$ln] = $masks }
                              if ($showOnlys.Count -gt 0) { $showOnlyFilters[$ln] = $showOnlys }
                          }
                      }
                  }
              }

              if ($saveRuntimeEnabled -and -not $isLoggedIn) {
                  $qwinsta = qwinsta 2>&1 | Out-String
                  if ($qwinsta -match "rdp-tcp#.*Active") {
                      $isLoggedIn = $true
                      Write-Host "`n[SUCCESS] RDP Connection established. Handing over idle monitoring to interactive daemon..." -ForegroundColor Green
                  } elseif (((Get-Date) - $startTime).TotalSeconds -gt $idleTimeoutSeconds) {
                      Write-Host "`n[ALERT] Pre-Login Timeout Reached! No RDP connection was established within $timeoutStr minutes." -ForegroundColor Yellow
                      Write-Host "::notice::Workflow completion triggered by Idle Timeout (Pre-Login)."
                      break
                  }
              }
              
              if (Test-Path "C:\state-repo\end_run.flag") {
                  Write-Host "`n[ALERT] Post-Login User Idle Timeout Reached! Gracefully finishing workflow..." -ForegroundColor Yellow
                  Write-Host "::notice::Workflow completion triggered by User Idle Timeout."
                  break
              }
              
              if (Test-Path $logDir) {
                  Get-ChildItem -Path $logDir -Filter "*.log" | ForEach-Object {
                      $filePath = $_.FullName
                      $fileName = $_.Name
                      if (-not $logPositions.ContainsKey($fileName)) { $logPositions[$fileName] = $_.Length }
                      $lastPos = $logPositions[$fileName]
                      
                      $file = Get-Item $filePath
                      if ($file.Length -gt $lastPos) {
                          $fs = [System.IO.FileStream]::new($filePath, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::ReadWrite)
                          $fs.Seek($lastPos, [System.IO.SeekOrigin]::Begin) | Out-Null
                          $reader = [System.IO.StreamReader]::new($fs)
                          while (-not $reader.EndOfStream) { 
                              $line = $reader.ReadLine()
                              
                              # Process dynamic <MASK>...</MASK>
                              if ($line -match "<MASK>(.*?)</MASK>") {
                                  $regexMatches = [regex]::Matches($line, "(?i)<MASK>(.*?)</MASK>")
                                  foreach ($m in $regexMatches) {
                                      $secret = $m.Groups[1].Value
                                      if (-not [string]::IsNullOrWhiteSpace($secret)) {
                                          if (-not $literalMaskFilters.ContainsKey($fileName)) {
                                              $literalMaskFilters[$fileName] = [System.Collections.Generic.List[string]]::new()
                                          }
                                          if (-not $literalMaskFilters[$fileName].Contains($secret)) {
                                              $literalMaskFilters[$fileName].Add($secret)
                                          }
                                      }
                                  }
                                  $line = [regex]::Replace($line, "(?i)<MASK>.*?</MASK>", "***")
                              }
                              
                              # Skip if the log is in the telemetry blocklist
                              if ($telemetryBlocklist.ContainsKey($fileName)) {
                                  continue
                              }
                              
                              # Check if we should only show specific lines
                              if ($showOnlyFilters.ContainsKey($fileName)) {
                                  $matchedShow = $false
                                  foreach ($pattern in $showOnlyFilters[$fileName]) {
                                      if ($line -match $pattern) {
                                          $matchedShow = $true
                                          break
                                      }
                                  }
                                  if (-not $matchedShow) { continue }
                              }
                              
                              # Check if the line matches any hide filters
                              $skipLine = $false
                              if ($hideFilters.ContainsKey($fileName)) {
                                  foreach ($pattern in $hideFilters[$fileName]) {
                                      if ($line -match $pattern) {
                                          $skipLine = $true
                                          break
                                      }
                                  }
                              }
                              if ($skipLine) { continue }
                              
                              # Apply mask filters
                              if ($maskFilters.ContainsKey($fileName)) {
                                  foreach ($pattern in $maskFilters[$fileName]) {
                                      $line = $line -replace $pattern, '***'
                                  }
                              }
                              
                              # Apply literal mask filters
                              if ($literalMaskFilters.ContainsKey($fileName)) {
                                  foreach ($secret in $literalMaskFilters[$fileName]) {
                                      $line = $line.Replace($secret, "***")
                                  }
                              }
                              
                              $printName = if ($telemetryDisplayNames.ContainsKey($fileName)) { $telemetryDisplayNames[$fileName] } else { $fileName }
                              Write-Host "[$printName] $line" 
                          }
                          $logPositions[$fileName] = $fs.Position
                          $reader.Close()
                          $fs.Close()
                      }
                  }
              }
              Start-Sleep -Seconds 5
          }


      - name: Finalize Session Persistence & State Synchronization
        if: always()
        shell: powershell
        run: |
          [System.Environment]::GetEnvironmentVariables("Machine").GetEnumerator() | ForEach-Object { [System.Environment]::SetEnvironmentVariable($_.Key, $_.Value, "Process") }
          Write-Host "=== INITIATING EMERGENCY TEARDOWN ==="
          $stateRepo = 'C:\state-repo'
          if (-not (Test-Path $stateRepo)) { exit 0 }
          
          if (-not (Test-Path "$stateRepo\end_run.flag")) {
              Write-Host "Broadcasting end_run.flag to workspace projects for graceful shutdown..."
              New-Item -Path "$stateRepo\end_run.flag" -ItemType File -Force | Out-Null
          }
          Write-Host "Waiting 30 seconds for gracefully exiting processes..."
          Start-Sleep -Seconds 30
          
          if (Test-Path "$stateRepo\Repository\Essentials\Force-Backup.ps1") {
              Write-Host "Executing Final Backup..."
              & "$stateRepo\Repository\Essentials\Force-Backup.ps1"
          }

          # Kill lingering background processes spawned by the RDP session
          # (sync daemon, idle monitor, project runners) so the GHA runner can exit cleanly.
          # NOTE: We do NOT call 'logoff' here — logoff terminates the Windows session that
          #       owns the GHA runner process tree, causing the workflow to hang without
          #       ever reporting completion to GitHub.
          Write-Host "Cleaning up lingering background processes..."
          Get-Process -Name "powershell", "pwsh", "python", "cmd" -ErrorAction SilentlyContinue |
              Where-Object { $_.Id -ne $PID } |
              Stop-Process -Force -ErrorAction SilentlyContinue
          Write-Host "Teardown complete."

